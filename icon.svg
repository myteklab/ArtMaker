<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a1a2e"/>
  <!-- Mandala petals -->
  <g transform="translate(50,50)">
    <g fill="none" stroke-width="2" stroke-linecap="round">
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#e94560" fill="#e94560" fill-opacity="0.3"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#ff6b35" fill="#ff6b35" fill-opacity="0.3" transform="rotate(45)"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#ffc857" fill="#ffc857" fill-opacity="0.3" transform="rotate(90)"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#2ec4b6" fill="#2ec4b6" fill-opacity="0.3" transform="rotate(135)"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#3a86ff" fill="#3a86ff" fill-opacity="0.3" transform="rotate(180)"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#8338ec" fill="#8338ec" fill-opacity="0.3" transform="rotate(225)"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#ff006e" fill="#ff006e" fill-opacity="0.3" transform="rotate(270)"/>
      <path d="M0,-35 Q12,-20 0,-5 Q-12,-20 0,-35" stroke="#44cf6c" fill="#44cf6c" fill-opacity="0.3" transform="rotate(315)"/>
    </g>
    <!-- Center dot -->
